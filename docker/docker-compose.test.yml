version: "3.9"

# ============================================================
# TEST OMGEVING
# Gebruik: docker compose -f docker-compose.test.yml up
# ============================================================

services:
  db-test:
    image: postgres:15-alpine
    container_name: openmrs-db-test
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-openmrs_test}
      POSTGRES_USER: ${DB_USER:-openmrs_test}
      POSTGRES_PASSWORD: ${DB_PASSWORD}   # verplicht via env / secret
    volumes:
      - db_test_data:/var/lib/postgresql/data
      - ./seed/test-seed.sql:/docker-entrypoint-initdb.d/seed.sql:ro
    networks:
      - test-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-openmrs_test}"]
      interval: 10s
      retries: 5

  openmrs-test:
    image: openmrs/openmrs-reference-application-3-backend:${APP_VERSION:-latest}
    container_name: openmrs-app-test
    restart: unless-stopped
    depends_on:
      db-test:
        condition: service_healthy
    environment:
      APP_ENV: test
      DB_HOST: db-test
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-openmrs_test}
      DB_USER: ${DB_USER:-openmrs_test}
      DB_PASSWORD: ${DB_PASSWORD}
      OPENMRS_ADMIN_USER: ${OPENMRS_ADMIN_USER:-admin}
      OPENMRS_ADMIN_PASSWORD: ${OPENMRS_ADMIN_PASSWORD}
      SEED_TEST_DATA: "true"
    ports:
      - "8081:8080"   # test op afwijkende poort, nooit 80/443
    networks:
      - test-net
    labels:
      environment: test
      managed-by: github-actions

volumes:
  db_test_data:

networks:
  test-net:
    driver: bridge
