name: Periodieke Beveiligingsscan

on:
  schedule:
    - cron: "0 3 * * 1"   # Elke maandag 03:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  scheduled-codeql:
    name: Wekelijkse CodeQL Scan
    runs-on: ubuntu-latest
    strategy:
      matrix:
        language: ["java"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 8
        uses: actions/setup-java@v4
        with:
          java-version: "8"
          distribution: "temurin"
          cache: maven

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}

      - name: Build (zonder omod)
        run: |
          mvn clean package \
            --no-transfer-progress \
            -DskipTests \
            -pl api,api-1.9,api-1.10,api-2.0,api-2.2,api-tests \
            -am

      - name: Analyse
        uses: github/codeql-action/analyze@v3

  scheduled-sbom:
    name: Wekelijkse SBOM & SCA
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Genereer SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610
        with:
          format: cyclonedx-json
          output-file: sbom-weekly.cyclonedx.json

      - name: SCA met OSV Scanner
        uses: google/osv-scanner-action@764c91816374ff2d8fc2095dab36eecd42d61638
        continue-on-error: true
        with:
          scan-args: |-
            --sbom=sbom-weekly.cyclonedx.json

      - name: Upload wekelijkse SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom-weekly-${{ github.run_number }}
          path: sbom-weekly.cyclonedx.json
          retention-days: 365   # NEN-7510: jaarlijkse bewaarplicht
