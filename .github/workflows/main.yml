name: CI — Build, Test & Security

on:
  push:
    branches: ["main", "dev", "test", "acceptation"]
  pull_request:
    branches: ["main", "dev", "test", "acceptation"]

permissions:
  contents: read
  security-events: write

jobs:

  # ─────────────────────────────
  # 1. BUILD
  # ─────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 8
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "8"
          cache: maven

      - name: Build with Maven
        run: mvn -B clean package -DskipTests

      - name: Upload artifact (.omod)
        uses: actions/upload-artifact@v4
        with:
          name: build-artifact
          path: "**/target/*.omod"
          retention-days: 30


  # ─────────────────────────────
  # 2. TESTS
  # ─────────────────────────────
  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 8
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "8"
          cache: maven

      - name: Run tests
        run: mvn -B test

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: "**/target/surefire-reports/**"
          retention-days: 30


  # ─────────────────────────────
  # 3. SECURITY (SAST + SCA + SBOM)
  # ─────────────────────────────
  security:
    name: Security scans
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 8
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "8"
          cache: maven

      # ───────── SBOM (CycloneDX) ─────────
      - name: Generate SBOM (CycloneDX)
        run: mvn -B org.cyclonedx:cyclonedx-maven-plugin:makeAggregateBom

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: "**/target/bom.json"
          retention-days: 90

      # ───────── SCA (dependency scan) ─────────
      - name: OSV vulnerability scan
        uses: google/osv-scanner-action@v1
        with:
          scan-args: .