name: Deploy — Productie

on:
  push:
    branches: ["main"]
  workflow_dispatch:
    inputs:
      version:
        description: "Docker image tag / git SHA om te deployen"
        required: true
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  # ──────────────────────────────────────────────
  # APPROVAL GATE — vereist handmatige goedkeuring
  # Configureer in GitHub: Settings > Environments > production
  # Voeg required reviewers toe aan de "production" environment.
  # ──────────────────────────────────────────────
  deploy-production:
    name: Deploy naar Productie
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://openmrs.example.com

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.version || github.sha }}

      # Valideer dat alle CI-checks geslaagd zijn vóór deploy
      - name: Controleer CI-status
        uses: actions/github-script@v9
        with:
          script: |
            const sha = context.sha;
            const checks = await github.rest.checks.listForRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: sha,
            });
            const failed = checks.data.check_runs.filter(
              c => c.conclusion !== 'success' && c.conclusion !== 'skipped' && c.name !== context.job
            );
            if (failed.length > 0) {
              core.setFailed(`Niet alle checks geslaagd: ${failed.map(c => c.name).join(', ')}`);
            }

      - name: Deploy naar productie via Docker Compose
        env:
          DB_PASSWORD: ${{ secrets.DB_PASSWORD_PROD }}
          OPENMRS_ADMIN_PASSWORD: ${{ secrets.OPENMRS_ADMIN_PASSWORD_PROD }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN_PROD }}
          APP_VERSION: ${{ github.event.inputs.version || github.sha }}
        run: |
          docker compose -f docker/docker-compose.production.yml pull
          docker compose -f docker/docker-compose.production.yml up -d --force-recreate

      - name: Health check productie
        run: |
          echo "Wachten op applicatie..."
          sleep 45
          curl --fail --retry 5 --retry-delay 15 \
            https://openmrs.example.com/openmrs/health || exit 1

      - name: Maak GitHub Deployment aan (audit trail)
        uses: actions/github-script@v9
        with:
          script: |
            await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.sha,
              environment: 'production',
              description: `Deployed by ${context.actor}`,
              auto_merge: false,
              required_contexts: [],
            });

      - name: Upload deployment log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deploy-log-prod-${{ github.run_number }}
          path: /tmp/deploy.log
          retention-days: 90   # NEN-7510: productielogs langer bewaren
