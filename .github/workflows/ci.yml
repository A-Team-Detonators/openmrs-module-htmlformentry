name: CI — Build, Test & Security

on:
  push:
    branches: ["main", "production", "acceptation", "test"]
  pull_request:
    branches: ["main", "production", "acceptation", "test"]

permissions:
  contents: read
  security-events: write   # CodeQL / SARIF upload
  pull-requests: write     # Dependency Review comments

jobs:
  # ──────────────────────────────────────────────
  # 1. BUILD
  # ──────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-java-maven

      - name: Build
        run: mvn clean package --no-transfer-progress -DskipTests

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: "**/target/*.jar"
          retention-days: 30

  # ──────────────────────────────────────────────
  # 2. TESTS
  # ──────────────────────────────────────────────
  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-java-maven

      - name: Run tests
        run: |
          mvn clean test \
            --no-transfer-progress \
            -pl api,api-1.9,api-1.10,api-2.0,api-2.2,api-tests \
            -am

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: "**/target/surefire-reports/**"
          retention-days: 30

  # ──────────────────────────────────────────────
  # 3. CODEQL — SAST (Java 8 safe mode)
  # ──────────────────────────────────────────────
  codeql:
    name: CodeQL SAST
    runs-on: ubuntu-latest
    needs: build
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language: ["java"]
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-java-maven

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}

      - name: Build for CodeQL (without omod)
        run: |
          mvn clean package \
            --no-transfer-progress \
            -DskipTests \
            -pl api,api-1.9,api-1.10,api-2.0,api-2.2,api-tests \
            -am

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
          upload: true
          output: codeql-results

      - name: Upload CodeQL SARIF
        uses: actions/upload-artifact@v4
        with:
          name: codeql-sarif
          path: codeql-results/
          retention-days: 90   # NEN-7510: beveiligingsrapporten langer bewaren

  # ──────────────────────────────────────────────
  # 4. DEPENDENCY REVIEW (alleen op PR)
  # ──────────────────────────────────────────────
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          deny-licenses: GPL-3.0, AGPL-3.0

  # ──────────────────────────────────────────────
  # 5. SBOM — anchore/sbom-action (geen Maven build nodig)
  # Genereert SBOM direct van de broncode / pom.xml
  # ──────────────────────────────────────────────
  sbom:
    name: Generate SBOM
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Generate SBOM (no build dependency)
        uses: anchore/sbom-action@v0
        with:
          format: cyclonedx-json
          output-file: sbom.cyclonedx.json

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom-cyclonedx
          path: sbom.cyclonedx.json
          retention-days: 90   # NEN-7510: bewaarplicht beveiligingsartefacten

  # ──────────────────────────────────────────────
  # 6. OSV SCAN
  # ──────────────────────────────────────────────
  osv-scan:
    name: OSV Scanner
    needs: build
    permissions:
      actions: read
      contents: read
      security-events: write
    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable.yml@v2.3.8
    with:
      scan-args: |-
        --sbom=sbom.cyclonedx.json