name: CI — Build, Test & Security

on:
  push:
    branches: ["main", "production", "acceptation", "test"]
  pull_request:
    branches: ["main", "production", "acceptation", "test"]

permissions:
  contents: read
  security-events: write   # CodeQL / SARIF upload
  pull-requests: write     # Dependency Review comments

jobs:
  # ──────────────────────────────────────────────
  # 1. BUILD
  # ──────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 8
        uses: actions/setup-java@v4
        with:
          java-version: "8"
          distribution: "temurin"
          cache: maven

      - name: Build with Maven
        run: mvn clean package -DskipTests --no-transfer-progress

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-artifact
          path: "**/target/*.omod"
          retention-days: 30   # NEN-7510: bewaarplicht CI-artefacten

  # ──────────────────────────────────────────────
  # 2. TESTS
  # ──────────────────────────────────────────────
  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 8
        uses: actions/setup-java@v4
        with:
          java-version: "8"
          distribution: "temurin"
          cache: maven

      - name: Run tests
        run: mvn clean test --no-transfer-progress

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: "**/target/surefire-reports/**"
          retention-days: 30

  # ──────────────────────────────────────────────
  # 3. CODEQL — SAST (Java 8 safe mode)
  # ──────────────────────────────────────────────
  codeql:
    name: CodeQL SAST
    runs-on: ubuntu-latest
    needs: build
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language: ["java"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 8
        uses: actions/setup-java@v4
        with:
          java-version: "8"
          distribution: "temurin"
          cache: maven

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}

      - name: Build for CodeQL
        run: mvn clean package -DskipTests --no-transfer-progress

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
          upload: true
          output: codeql-results

      - name: Upload CodeQL SARIF
        uses: actions/upload-artifact@v4
        with:
          name: codeql-sarif
          path: codeql-results/
          retention-days: 90   # NEN-7510: beveiligingsrapporten langer bewaren

  # ──────────────────────────────────────────────
  # 4. DEPENDENCY REVIEW (alleen op PR)
  # ──────────────────────────────────────────────
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          deny-licenses: GPL-3.0, AGPL-3.0

  # ──────────────────────────────────────────────
  # 5. SBOM GENEREREN
  # ──────────────────────────────────────────────
  sbom:
    name: Generate SBOM
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Generate SBOM (no build dependency)
        uses: anchore/sbom-action@v0
        with:
          format: cyclonedx-json
          output-file: sbom.cyclonedx.json

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.cyclonedx.json
          retention-days: 90   # NEN-7510: bewaarplicht beveiligingsartefacten

      - name: Analyse SBOM met OSV-scanner (SCA)
        uses: google/osv-scanner-action@v1
        with:
          scan-args: |-
            --sbom=target/bom.json