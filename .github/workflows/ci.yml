name: CI — Build, Test & Security

on:
  push:
    branches: ["main", "production", "acceptation", "test"]
  pull_request:
    branches: ["main", "production", "acceptation", "test"]

permissions:
  contents: read
  security-events: write   # CodeQL / SARIF upload
  pull-requests: write     # Dependency Review comments

jobs:
  # ──────────────────────────────────────────────
  # 1. BUILD
  # ──────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-java-maven

      - name: Build
        run: mvn clean package --no-transfer-progress -DskipTests

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: "**/target/*.jar"
          retention-days: 30

  # ──────────────────────────────────────────────
  # 2. TESTS
  # ──────────────────────────────────────────────
  test:
      name: Tests & Coverage
      runs-on: ubuntu-latest
      needs: build
      steps:
        - uses: actions/checkout@v4
        - uses: ./.github/actions/setup-java-maven

        - name: Run tests
          run: mvn clean test --no-transfer-progress -P ci

        - name: Genereer coverage rapport & controleer drempel
          # jacoco:report  → HTML/XML naar target/site/jacoco/
          # jacoco:check   → blokkeert build als coverage < 60%
          run: mvn jacoco:report jacoco:check --no-transfer-progress -P ci

        - name: Upload coverage rapporten (HTML)
          if: always()
          uses: actions/upload-artifact@v4
          with:
            name: coverage-report
            path: "**/target/site/jacoco/"
            retention-days: 30   # NEN-7510: testartefacten bewaren

        - name: Upload test rapporten (Surefire XML)
          if: always()
          uses: actions/upload-artifact@v4
          with:
            name: test-reports
            path: "**/target/surefire-reports/**"
            retention-days: 30

        # Samenvattingsregel in de PR — toont coverage % direct in de check
        - name: Coverage samenvatting in job-summary
          if: always()
          run: |
            echo "## 📊 Code Coverage Samenvatting" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| Module | Rapport |" >> $GITHUB_STEP_SUMMARY
            echo "|--------|---------|" >> $GITHUB_STEP_SUMMARY
            for f in $(find . -path "*/target/site/jacoco/index.html" | sort); do
              module=$(echo "$f" | cut -d/ -f2)
              echo "| $module | \`$f\` |" >> $GITHUB_STEP_SUMMARY
            done
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "> Drempel: **60% instruction coverage** (geblokkeerd door \`jacoco:check\` in pom.xml, profiel \`ci\`)" >> $GITHUB_STEP_SUMMARY

  # ──────────────────────────────────────────────
  # 3. CODEQL — SAST (Java 8 safe mode)
  # ──────────────────────────────────────────────
  codeql:
    name: CodeQL SAST
    runs-on: ubuntu-latest
    needs: build
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language: ["java"]
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-java-maven

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}

      - name: Build for CodeQL (without omod)
        run: |
          mvn clean package \
            --no-transfer-progress \
            -DskipTests \
            -pl api,api-1.9,api-1.10,api-2.0,api-2.2,api-tests \
            -am

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
          upload: true
          output: codeql-results

      - name: Upload CodeQL SARIF
        uses: actions/upload-artifact@v4
        with:
          name: codeql-sarif
          path: codeql-results/
          retention-days: 90   # NEN-7510: beveiligingsrapporten langer bewaren

  # ──────────────────────────────────────────────
  # 4. DEPENDENCY REVIEW (alleen op PR)
  # ──────────────────────────────────────────────
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          deny-licenses: GPL-3.0, AGPL-3.0

  # ──────────────────────────────────────────────
  # 5. SBOM — anchore/sbom-action (geen Maven build nodig)
  # Genereert SBOM direct van de broncode / pom.xml
  # ──────────────────────────────────────────────
  sbom:
    name: Generate SBOM
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Generate SBOM (no build dependency)
        uses: anchore/sbom-action@v0
        with:
          format: cyclonedx-json
          output-file: sbom.cyclonedx.json

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom-cyclonedx
          path: sbom.cyclonedx.json
          retention-days: 90   # NEN-7510: bewaarplicht beveiligingsartefacten
      
      - name: Commit SBOM to repository
        if: github.event_name == 'push'
        run: |
          mkdir -p docs/sbom
          cp sbom.cyclonedx.json docs/sbom/sbom.cyclonedx.json
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/sbom/sbom.cyclonedx.json
          git diff --staged --quiet || git commit -m "chore: update SBOM [skip ci]"
          git push

  # ──────────────────────────────────────────────
  # 6. OSV SCAN
  # ──────────────────────────────────────────────
  osv-scan:
    name: OSV Scanner
    needs: build
    permissions:
      actions: read
      contents: read
      security-events: write
    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable.yml@v2.3.8
    with:
      scan-args: |-
        --sbom=sbom.cyclonedx.json