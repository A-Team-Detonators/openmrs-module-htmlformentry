name: CI — Build, Test & Security

on:
  push:
    branches: ["main", "production", "acceptation", "test", "dev"]
  pull_request:
    branches: ["main", "production", "acceptation", "test", "dev"]

permissions:
  contents: read
  security-events: write   # CodeQL / SARIF upload
  pull-requests: write     # Dependency Review comments

jobs:
  # ──────────────────────────────────────────────
  # 1. BUILD
  # ──────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-java-maven

      - name: Build
        run: mvn clean package --no-transfer-progress -DskipTests -P ci

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: "**/target/*.jar"
          retention-days: 90   # NEN-7510: beveiligingsrapporten langer bewaren

  # ──────────────────────────────────────────────
  # 2. TESTS
  # ──────────────────────────────────────────────
  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-java-maven
 
      - name: Run tests & genereer coverage rapport
        run: |
          mvn verify jacoco:report \
            --no-transfer-progress \
            -pl api,api-1.9,api-1.10,api-2.0,api-2.2,api-tests \
            -am -P ci
 
      - name: Verzamel coverage rapporten
        if: always()
        run: |
          mkdir -p coverage-reports
          find . -path "*/target/site/jacoco" -type d | while read dir; do
            module=$(echo "$dir" | cut -d/ -f2)
            cp -r "$dir" "coverage-reports/$module"
          done

      - name: Debug — zoek jacoco bestanden
        if: always()
        run: |
          echo "=== .exec bestanden ==="
          find . -name "*.exec"
          echo "=== jacoco mappen ==="  
          find . -name "jacoco" -type d
          echo "=== index.html ==="
          find . -name "index.html"

      - name: Upload coverage rapport
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage-reports/
          retention-days: 90
 
      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: "**/target/surefire-reports/**"
          retention-days: 90   # NEN-7510: beveiligingsrapporten langer bewaren

  # ──────────────────────────────────────────────
  # 3. CODEQL — SAST (Java 8 safe mode)
  # ──────────────────────────────────────────────
  codeql:
    name: CodeQL SAST
    runs-on: ubuntu-latest
    needs: build
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language: ["java"]
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-java-maven

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}

      - name: Build for CodeQL (without omod)
        run: |
          mvn clean package \
            --no-transfer-progress \
            -DskipTests \
            -pl api,api-1.9,api-1.10,api-2.0,api-2.2,api-tests \
            -am

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
          upload: true
          output: codeql-results

      - name: Upload CodeQL SARIF
        uses: actions/upload-artifact@v4
        with:
          name: codeql-sarif
          path: codeql-results/
          retention-days: 90   # NEN-7510: beveiligingsrapporten langer bewaren

  # ──────────────────────────────────────────────
  # 4. DEPENDENCY REVIEW (alleen op PR)
  # ──────────────────────────────────────────────
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          deny-licenses: GPL-3.0, AGPL-3.0

  # ──────────────────────────────────────────────
  # 5. SBOM — anchore/sbom-action (geen Maven build nodig)
  # Genereert SBOM direct van de broncode / pom.xml
  # ──────────────────────────────────────────────
  sbom:
    name: Generate SBOM
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Generate SBOM (no build dependency)
        uses: anchore/sbom-action@v0
        with:
          format: cyclonedx-json
          output-file: sbom.cyclonedx.json

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom-cyclonedx
          path: sbom.cyclonedx.json
          retention-days: 90   # NEN-7510: bewaarplicht beveiligingsartefacten
      
      - name: Commit SBOM to repository
        if: github.event_name == 'push'
        run: |
          mkdir -p docs/sbom
          cp sbom.cyclonedx.json docs/sbom/sbom.cyclonedx.json
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/sbom/sbom.cyclonedx.json
          git diff --staged --quiet || git commit -m "chore: update SBOM [skip ci]"
          git push

  # ──────────────────────────────────────────────
  # 6. OSV SCAN
  # ──────────────────────────────────────────────
  osv-scan:
    name: OSV Scanner
    needs: build
    permissions:
      actions: read
      contents: read
      security-events: write
    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable.yml@v2.3.8
    with:
      scan-args: |-
        --sbom=sbom.cyclonedx.json

  # ──────────────────────────────────────────────
  # 7. SONARQUBE SCAN
  # ──────────────────────────────────────────────
  sonar:
    name: SonarQube Scan
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: Configure Maven settings (OpenMRS repo)
        run: |
          mkdir -p ~/.m2
          cat > ~/.m2/settings.xml <<'EOF'
          <settings>
            <profiles>
              <profile>
                <id>openmrs</id>
                <repositories>
                  <repository>
                    <id>openmrs-repo</id>
                    <name>OpenMRS Nexus Repository</name>
                    <url>https://mavenrepo.openmrs.org/public</url>
                  </repository>
                </repositories>
                <pluginRepositories>
                  <pluginRepository>
                    <id>openmrs-repo</id>
                    <name>OpenMRS Nexus Repository</name>
                    <url>https://mavenrepo.openmrs.org/public</url>
                  </pluginRepository>
                </pluginRepositories>
              </profile>
            </profiles>
            <activeProfiles>
              <activeProfile>openmrs</activeProfile>
            </activeProfiles>
          </settings>
          EOF

      - name: SonarQube Scan
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          mvn sonar:sonar \
            -Dsonar.projectKey=${{ secrets.PROJECT_KEY }} \
            -Dsonar.organization=${{ secrets.ORGANIZATION_KEY }} \
            -Dsonar.host.url=${{ secrets.SONAR_HOST_URL }} \
            -Dsonar.java.source=8