version: 2

updates:
  # Maven / Java dependencies
  - package-ecosystem: "maven"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "security"
    reviewers:
      - "jouw-org/security-team"
    commit-message:
      prefix: "deps"
      include: "scope"
    groups:
      spring-boot:
        patterns:
          - "org.springframework.boot*"
      openmrs:
        patterns:
          - "org.openmrs*"

  # GitHub Actions versies
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "ci-cd"
    commit-message:
      prefix: "ci"

  # Docker base images
  - package-ecosystem: "docker"
    directory: "/docker"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "docker"
