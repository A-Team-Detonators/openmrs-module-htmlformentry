name: Setup OpenMRS Maven
description: Configure Maven settings for OpenMRS repositories

runs:
  using: composite
  steps:
    - name: Configure Maven settings
      shell: bash
      run: |
        mkdir -p ~/.m2
        cat > ~/.m2/settings.xml << 'EOF'
        <settings>
          <profiles>
            <profile>
              <id>openmrs</id>
              <pluginRepositories>
                <pluginRepository>
                  <id>openmrs-repo</id>
                  <url>https://mavenrepo.openmrs.org/public</url>
                </pluginRepository>
              </pluginRepositories>
            </profile>
          </profiles>
          <activeProfiles>
            <activeProfile>openmrs</activeProfile>
          </activeProfiles>
        </settings>
        EOF